<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股市大亨 Pro - 資產透明版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6c5ce7;
            --accent: #ff6b6b;
            --success: #00b894;
            --warning: #ffa502;
            --bg: #f0f2f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center; 
            padding: 20px; 
        }

        .game-container { 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 35px; padding: 40px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.25); 
            width: 100%; max-width: 850px; 
        }

        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .title { font-size: 32px; color: var(--primary); font-weight: 900; letter-spacing: 2px; }
        .timer { font-size: 14px; color: #999; font-weight: bold; }

        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .asset-card { background: #fff; border-radius: 20px; padding: 20px; border: 1px solid #eee; text-align: center; }
        .val { font-size: 38px; font-weight: 900; color: #2d3436; display: block; }
        .label { font-size: 13px; color: #b2bec3; font-weight: bold; letter-spacing: 1px; }

        .controls-grid { display: grid; grid-template-columns: 1.2fr 1.8fr; gap: 20px; margin-bottom: 25px; }

        .bank-box { background: #f8f9fa; border-radius: 20px; padding: 20px; border: 2px dashed #d1d8e0; }
        .bank-title { font-size: 15px; font-weight: bold; color: var(--primary); margin-bottom: 15px; }
        .bank-ui { display: flex; flex-direction: column; gap: 10px; }
        .bank-input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; text-align: center; font-size: 18px; font-weight: bold; outline: none; }
        .bank-btns { display: flex; gap: 10px; }
        .btn-b { flex: 1; padding: 12px; border: none; border-radius: 12px; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; }

        .market-view { display: flex; flex-direction: column; gap: 15px; }
        .stocks-nav { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .nav-item { 
            padding: 15px; border-radius: 15px; background: white; border: 3px solid #eee; 
            cursor: pointer; transition: 0.3s; text-align: center; position: relative;
        }
        .nav-item.active { border-color: var(--accent); background: #fff5f5; transform: scale(1.02); }
        .nav-holding-badge { position: absolute; top: -10px; right: -5px; background: #2d3436; color: white; font-size: 10px; padding: 2px 8px; border-radius: 10px; }
        
        .price-banner { 
            flex-grow: 1; border-radius: 20px; padding: 25px; color: white; 
            text-align: center; display: flex; flex-direction: column; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: background 0.5s;
        }
        .holding-info { font-size: 16px; margin-top: 10px; background: rgba(0,0,0,0.2); padding: 5px 15px; border-radius: 12px; display: inline-block; align-self: center; }

        .charts-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .chart-card { background: white; border: 1px solid #eee; border-radius: 20px; padding: 15px; height: 180px; position: relative; overflow: hidden; }
        .chart-info { position: absolute; top: 10px; left: 15px; font-size: 11px; color: #ccc; font-weight: bold; }

        .trade-row { display: flex; gap: 15px; }
        .btn-t { flex: 1; padding: 20px; border-radius: 20px; border: none; font-size: 20px; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .buy { background: #fab1a0; color: #e17055; }
        .sell { background: #81ecec; color: #00b894; }
        .btn-t:active { transform: translateY(3px); }

        .footer { margin-top: 20px; font-size: 14px; color: #b2bec3; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="header">
            <div class="title-group">
                <h1 class="title">股市大亨</h1>
                <div class="timer" id="timer">市場更新倒數：10秒</div>
            </div>
            <div style="text-align: right">
                <span class="label">預估總資產淨值</span>
                <span id="total" style="font-size: 26px; font-weight: 900; display: block; color: #2d3436;">$1,000</span>
            </div>
        </div>

        <div class="dashboard">
            <div class="asset-card">
                <span class="label">錢包現金</span>
                <span class="val" style="color: var(--accent)">$<span id="cash">1,000</span></span>
            </div>
            <div class="asset-card">
                <span class="label">銀行存款</span>
                <span class="val" style="color: var(--primary)">$<span id="bank">0</span></span>
            </div>
        </div>

        <div class="controls-grid">
            <div class="bank-box">
                <div class="bank-title">🏦 數位銀行 (每輪利息 3%)</div>
                <div class="bank-ui">
                    <input type="number" id="bankAmt" class="bank-input" value="100" min="0">
                    <div class="bank-btns">
                        <button class="btn-b" style="background: var(--primary)" onclick="bankOp('in')">存入</button>
                        <button class="btn-b" style="background: #e84393" onclick="bankOp('out')">提款</button>
                    </div>
                </div>
            </div>

            <div class="market-view">
                <div class="stocks-nav" id="stockNav"></div>
                <div class="price-banner" id="priceBanner">
                    <span id="curName" style="font-size: 14px; font-weight: bold; opacity: 0.9;">讀取中...</span>
                    <span style="font-size: 42px; font-weight: 900;">$<span id="curPrice">0</span></span>
                    <div class="holding-info">持有數量：<span id="curHolding">0</span> 股</div>
                </div>
            </div>
        </div>

        <div class="charts-section">
            <div class="chart-card">
                <span class="chart-info">價格走勢圖</span>
                <canvas id="pChart"></canvas>
            </div>
            <div class="chart-card">
                <span class="chart-info">持股總價值</span>
                <canvas id="vChart"></canvas>
            </div>
        </div>

        <div class="trade-row">
            <button class="btn-t buy" onclick="trade('buy')">買入 1 股</button>
            <button class="btn-t sell" onclick="trade('sell')">賣出 1 股</button>
        </div>

        <div id="status" class="footer">💡 歡迎！點擊上方股票卡片可切換查看。</div>
    </div>

    <script>
        const STOCKS = [
            { name: '護國神山 TSM', color: '#6c5ce7', vola: 6 },
            { name: '宇宙航空 TSLA', color: '#ff7675', vola: 16 }
        ];

        let cash = 1000, bank = 0, cur = 0;
        let prices = [100, 100], holdings = [0, 0], histories = [[], []];
        let timer = 10, chartP, chartV;

        window.onload = () => {
            STOCKS.forEach((_, i) => { for(let j=0; j<20; j++) histories[i].push(100); });
            initCharts();
            update();
            setInterval(tick, 1000);
        };

        function tick() {
            timer--;
            document.getElementById('timer').innerText = `市場更新倒數：${timer}秒`;
            if(timer <= 0) {
                if(bank > 0) bank = Math.floor(bank * 1.03);
                STOCKS.forEach((s, i) => {
                    prices[i] = Math.max(5, Math.round(prices[i] + (Math.random() - 0.5) * s.vola * 2));
                    histories[i].push(prices[i]);
                    if(histories[i].length > 20) histories[i].shift();
                });
                timer = 10;
                update();
            }
        }

        function initCharts() {
            const cfg = {
                responsive: true, maintainAspectRatio: false,
                scales: { x: { display: false }, y: { display: true, ticks: { size: 10 } } },
                plugins: { legend: false },
                elements: { point: { radius: 0 }, line: { borderWidth: 3, tension: 0.4 } }
            };
            chartP = new Chart(document.getElementById('pChart'), { type: 'line', data: { labels: Array(20).fill(''), datasets: [{ data: [] }] }, options: cfg });
            chartV = new Chart(document.getElementById('vChart'), { type: 'line', data: { labels: Array(20).fill(''), datasets: [{ data: [] }] }, options: cfg });
        }

        function update() {
            const stockVal = prices.reduce((s, p, i) => s + (p * holdings[i]), 0);
            document.getElementById('total').innerText = `$${(cash + bank + stockVal).toLocaleString()}`;
            document.getElementById('cash').innerText = cash.toLocaleString();
            document.getElementById('bank').innerText = bank.toLocaleString();

            document.getElementById('stockNav').innerHTML = STOCKS.map((s, i) => `
                <div class="nav-item ${i===cur?'active':''}" onclick="cur=${i};update();">
                    ${holdings[i] > 0 ? `<span class="nav-holding-badge">${holdings[i]}股</span>` : ''}
                    <div style="font-size:11px; color:#999">${s.name.split(' ')[1]}</div>
                    <b style="color:${s.color}">$${prices[i]}</b>
                </div>
            `).join('');

            const s = STOCKS[cur];
            document.getElementById('curPrice').innerText = prices[cur];
            document.getElementById('curName').innerText = s.name;
            document.getElementById('curHolding').innerText = holdings[cur];
            document.getElementById('priceBanner').style.backgroundColor = s.color;

            chartP.data.datasets[0].data = histories[cur];
            chartP.data.datasets[0].borderColor = s.color;
            chartP.update('none');

            chartV.data.datasets[0].data = histories[cur].map(p => p * holdings[cur]);
            chartV.data.datasets[0].borderColor = s.color;
            chartV.update('none');
        }

        function bankOp(type) {
            const amt = parseInt(document.getElementById('bankAmt').value);
            if(amt <= 0 || isNaN(amt)) return;
            if(type === 'in' && cash >= amt) { cash -= amt; bank += amt; showMsg("✅ 成功存入銀行！"); }
            else if(type === 'out' && bank >= amt) { bank -= amt; cash += amt; showMsg("✅ 成功提領現金！"); }
            else showMsg("❌ 金額不足！");
            update();
        }

        function trade(type) {
            const p = prices[cur];
            const fee = Math.max(1, Math.ceil(p * 0.001));
            if(type === 'buy') {
                if(cash >= (p + fee)) { cash -= (p + fee); holdings[cur]++; showMsg(`📈 買入 1 股成功！`); }
                else showMsg("❌ 現金不足！");
            } else {
                if(holdings[cur] > 0) { cash += (p - fee); holdings[cur]--; showMsg(`📉 賣出 1 股成功！`); }
                else showMsg("❌ 您沒有持股可以賣出！");
            }
            update();
        }

        function showMsg(t) { document.getElementById('status').innerText = `💡 ${t}`; }
    </script>
</body>
</html>
