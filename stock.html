    <style>
        :root {

        * { margin: 0; padding: 0; box-sizing: border-box; }

        .game-container { background: white; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 950px; overflow: hidden; border: 8px solid #dcdde1; }
        
        .news-ticker { background: #2f3542; color: #ffffff; height: 110px; overflow: hidden; position: relative; display: flex; align-items: center; }
        .news-label { height: 100%; background: #e67e22; color: white; padding: 0 20px; z-index: 10; font-weight: 900; display: flex; align-items: center; font-size: 18px; box-shadow: 5px 0 15px rgba(0,0,0,0.3); text-align: center; width: 120px;}
        .news-window { flex-grow: 1; height: 100%; position: relative; padding: 10px 20px; }
        .news-content { 
            position: absolute; width: 100%; 
            display: flex; flex-direction: column; gap: 5px;
            animation: scrollUpGroup 5s cubic-bezier(0.23, 1, 0.32, 1) infinite; 
        }
        .news-item { font-size: 14px; font-weight: bold; color: #ecf0f1; border-left: 3px solid #e67e22; padding-left: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @keyframes scrollUpGroup { 
            0% { transform: translateY(120px); opacity: 0; } 
            10% { transform: translateY(0); opacity: 1; } 
            90% { transform: translateY(0); opacity: 1; } 
            100% { transform: translateY(-120px); opacity: 0; } 
        }

        .main-p { padding: 20px 25px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .asset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 15px; }
        .card { background: #f1f2f6; padding: 12px; border-radius: 20px; text-align: center; }
        .card-label { font-size: 11px; color: #747d8c; margin-bottom: 5px; font-weight: bold; }
        .card-val { font-size: 18px; font-weight: 900; color: #2f3542; }

        .market-grid { display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
        .stock-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .stock-item { background: white; border: 4px solid #f1f2f6; padding: 10px 15px; border-radius: 18px; cursor: pointer; transition: 0.2s; position: relative; }
        .stock-item.active { border-color: var(--primary); background: #e1f5fe; }
        .stock-item.crypto-active { border-color: var(--crypto-color); background: #fff9e6; }
        
        .limit-up { background: #ffebeb !important; border-color: var(--up-color) !important; }
        .limit-down { background: #e0f2f1 !important; border-color: var(--down-color) !important; }

        .badge-row { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
        .hold-badge { background: #57606f; color: white; padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: bold; }
        .profit-badge { padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: bold; color: white; }

        .price-big { font-size: 45px; font-weight: 900; margin-bottom: 5px; line-height: 1; }
        .chart-box { height: 180px; background: white; margin-bottom: 15px; }
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .b-btn { padding: 15px; border: none; border-radius: 20px; font-size: 20px; font-weight: 900; cursor: pointer; color: white; transition: 0.2s; }
        .b-buy { background: var(--up-color); }
        .b-sell { background: var(--down-color); }

        .bank-area { margin-top: 15px; padding: 12px; background: #dfe4ea; border-radius: 20px; display: flex; align-items: center; gap: 10px; font-weight: bold; }

        ];

        let cash = 10000, bank = 0, curIdx = 0, holdings = [0, 0, 0, 0], totalCosts = [0, 0, 0, 0];
        let priceHistories = STOCKS.map(s => Array(25).fill(s.basePrice));
        let timer = 15, chart, currentEvents = [];
        
        const STOCK_BUY_FEE = 0.001425, STOCK_SELL_TAX = 0.003, CRYPTO_FEE = 0.001;
        const TRUTH_RATE = 0.7; // 正確率 70%

        window.onload = () => { prepareNextEvents(); initChart(); updateUI(); setInterval(tick, 1000); };

        function prepareNextEvents() {
            currentEvents = [];
            let pool = [...PREDICTIONS];
            for (let i = 0; i < 3; i++) {
                const idx = Math.floor(Math.random() * pool.length);
                currentEvents.push(pool.splice(idx, 1)[0]);
            }
            const box = document.getElementById('newsBox');
            box.style.animation = 'none'; box.offsetHeight; 
            box.style.animation = 'scrollUpGroup 5s cubic-bezier(0.23, 1, 0.32, 1) infinite';
            box.innerHTML = currentEvents.map(ev => `<div class="news-item">${ev.t}</div>`).join('');
        }

        function tick() {
            timer--;
            document.getElementById('timer').innerText = `距離行情實現：${timer}秒`;
            if (timer <= 0) { applyMarketChanges(); timer = 15; }
        }

        function applyMarketChanges() {
            const marketSentiment = (Math.random() - 0.45) * 0.012; 

            STOCKS.forEach((s, i) => {
                const last = priceHistories[i][priceHistories[i].length - 1];
                let eventImpact = 1.0;

                currentEvents.forEach(ev => {
                    const isTrue = Math.random() < TRUTH_RATE;
                    if (isTrue) {
                        eventImpact *= ev.imp[i]; 
                    } else {
                        // 30% 反轉機制：原漲則跌，原跌則漲
                        if (ev.imp[i] !== 1.0) {
                            eventImpact *= (1.0 / ev.imp[i]); 
                        }
                    }
                });

                const meanReversion = (s.basePrice - last) / s.basePrice * 0.01;
                let volatility = s.vola * (Math.random() - 0.5) * 2;
                let changeRate = Math.exp(s.drift + meanReversion + (marketSentiment * s.beta) + volatility);
                
                let nextPrice = last * changeRate * eventImpact;

                // 10% 漲跌停限制 (台股模擬)
                if (s.type === 'stock') {
                    const ratio = nextPrice / last;
                    if (ratio > 1.1) nextPrice = last * 1.1; 
                    if (ratio < 0.9) nextPrice = last * 0.9;
                }

                if (nextPrice < 1) nextPrice = 1;
                priceHistories[i].push(nextPrice);
                if (priceHistories[i].length > 25) priceHistories[i].shift();
            });

            if (bank > 0) bank *= 1.002;
            prepareNextEvents(); 
            updateUI();
            msg(`📢 結算完成！市場已反應消息（包含反轉風險）。`);
        }

        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: Array(25).fill(''), datasets: [{ data: priceHistories[curIdx], borderColor: STOCKS[curIdx].color, borderWidth: 5, pointRadius: 0, tension: 0.4, fill: true, backgroundColor: STOCKS[curIdx].color + '22' }] },
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    plugins: { legend: false }, 
                    scales: { x: { display: false }, y: { position: 'right' } } 
                }
            });
        }

        function updateUI() {
            const history = priceHistories[curIdx];
            const now = history[history.length - 1];
            const prev = history[history.length - 2];
            const change = ((now - prev) / prev * 100).toFixed(2);

            document.getElementById('stockList').innerHTML = STOCKS.map((s, i) => {
                const p = priceHistories[i][priceHistories[i].length-1];
                const lp = priceHistories[i][priceHistories[i].length-2];
                const rat = p / lp;
                let limitClass = (s.type === 'stock' && rat >= 1.099) ? "limit-up" : (s.type === 'stock' && rat <= 0.901) ? "limit-down" : "";
                const profitPercent = holdings[i] > 0 ? ((p * holdings[i] - totalCosts[i]) / totalCosts[i] * 100) : 0;
                return `<div class="stock-item ${i === curIdx ? 'active' : ''} ${limitClass}" onclick="selectStock(${i})">
                    <div style="font-size:10px; color:#999">${s.desc}</div>
                    <div style="display:flex; justify-content:space-between;"><b>${s.name}</b><span>$${p.toFixed(1)}</span></div>
                    <div class="badge-row">
                        ${holdings[i] > 0 ? `<span class="hold-badge">${holdings[i]} 單</span>` : ''}
                        ${holdings[i] > 0 ? `<span class="profit-badge" style="background:${profitPercent>=0?'#eb2f06':'#38ada9'}">${profitPercent>=0?'+':''}${profitPercent.toFixed(1)}%</span>` : ''}
                    </div>
                </div>`;
            }).join('');

            document.getElementById('curPrice').innerText = `$${now.toFixed(1)}`;
            document.getElementById('curName').innerText = STOCKS[curIdx].name;
            document.getElementById('curInventory').innerText = `持有：${holdings[curIdx]}`;
            const curVal = now * holdings[curIdx];
            document.getElementById('curProfit').innerText = `淨收益：$${(holdings[curIdx] > 0 ? (curVal - totalCosts[curIdx]) : 0).toFixed(0)}`;
            const cEl = document.getElementById('curChange');
            cEl.innerText = `${change >= 0 ? '▲' : '▼'} ${Math.abs(change)}%`;
            cEl.style.color = change >= 0 ? 'var(--up-color)' : 'var(--down-color)';

            let sVal = 0, cVal = 0;
            STOCKS.forEach((s, i) => {
                let val = priceHistories[i][priceHistories[i].length-1] * holdings[i];
                if(s.type === 'crypto') cVal += val; else sVal += val;
            });

            document.getElementById('stockValue').innerText = `$${sVal.toLocaleString(undefined,{maximumFractionDigits:0})}`;
            document.getElementById('cryptoValue').innerText = `$${cVal.toLocaleString(undefined,{maximumFractionDigits:0})}`;
            document.getElementById('total').innerText = `$${(cash + bank + sVal + cVal).toLocaleString(undefined,{maximumFractionDigits:0})}`;
            document.getElementById('cash').innerText = `$${cash.toLocaleString(undefined,{maximumFractionDigits:0})}`;
            document.getElementById('bank').innerText = `$${bank.toLocaleString(undefined,{maximumFractionDigits:0})}`;

            chart.data.datasets[0].data = history;
            chart.data.datasets[0].borderColor = STOCKS[curIdx].color;
            chart.update('none');
        }

        function selectStock(i) { curIdx = i; updateUI(); }

        function trade(type) {
            const s = STOCKS[curIdx], p = priceHistories[curIdx][priceHistories[curIdx].length - 1];
            if (type === 'buy') {
                const fee = p * ((s.type === 'crypto') ? CRYPTO_FEE : STOCK_BUY_FEE);
                if (cash >= p + fee) { cash -= (p + fee); holdings[curIdx]++; totalCosts[curIdx] += (p + fee); }
            } else {
                if (holdings[curIdx] > 0) {
                    const fee = p * ((s.type === 'crypto') ? CRYPTO_FEE : STOCK_BUY_FEE);
                    const tax = (s.type === 'crypto') ? 0 : p * STOCK_SELL_TAX;
                    cash += (p - fee - tax); totalCosts[curIdx] -= (totalCosts[curIdx]/holdings[curIdx]); holdings[curIdx]--;
                }
            }
            updateUI();
        }

        function bankOp(type) {
            const amt = parseInt(document.getElementById('bankAmt').value);
            if (type === 'in' && cash >= amt) { cash -= amt; bank += amt; }
            else if (type === 'out' && bank >= amt) { bank -= amt; cash += amt; }
            updateUI();
        }

        function msg(t) { document.getElementById('msg').innerText = t; }
    </script>
</body>
</html>
