<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小小股神：現實平衡進化版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #4a69bd; --accent: #f6b93b; --success: #78e08f;
            --up-color: #eb2f06; --down-color: #38ada9; --bg: #f0f3f6;
            --crypto-color: #f39c12;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: var(--bg); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .game-container { background: white; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 950px; overflow: hidden; border: 8px solid #dcdde1; }
        
        .news-ticker { background: #2f3542; color: #ffffff; height: 110px; overflow: hidden; position: relative; display: flex; align-items: center; }
        .news-label { height: 100%; background: #2ed573; color: #2f3542; padding: 0 20px; z-index: 10; font-weight: 900; display: flex; align-items: center; font-size: 18px; box-shadow: 5px 0 15px rgba(0,0,0,0.3); text-align: center; width: 120px;}
        .news-window { flex-grow: 1; height: 100%; position: relative; padding: 10px 20px; }
        .news-content { 
            position: absolute; width: 100%; 
            display: flex; flex-direction: column; gap: 5px;
            animation: scrollUpGroup 5s cubic-bezier(0.23, 1, 0.32, 1) infinite; 
        }
        .news-item { font-size: 14px; font-weight: bold; color: #70a1ff; border-left: 3px solid #2ed573; padding-left: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @keyframes scrollUpGroup { 
            0% { transform: translateY(120px); opacity: 0; } 
            10% { transform: translateY(0); opacity: 1; } 
            90% { transform: translateY(0); opacity: 1; } 
            100% { transform: translateY(-120px); opacity: 0; } 
        }

        .main-p { padding: 20px 25px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .asset-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 15px; }
        .card { background: #f1f2f6; padding: 12px; border-radius: 20px; text-align: center; }
        .card-label { font-size: 11px; color: #747d8c; margin-bottom: 5px; font-weight: bold; }
        .card-val { font-size: 18px; font-weight: 900; color: #2f3542; }

        .market-grid { display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
        .stock-list { display: flex; flex-direction: column; gap: 8px; max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .stock-item { background: white; border: 4px solid #f1f2f6; padding: 10px 15px; border-radius: 18px; cursor: pointer; transition: 0.2s; }
        .stock-item.active { border-color: var(--primary); background: #e1f5fe; }
        .stock-item.crypto-active { border-color: var(--crypto-color); background: #fff9e6; }
        
        .badge-row { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
        .hold-badge { background: #57606f; color: white; padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: bold; }
        .profit-badge { padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: bold; color: white; }

        .price-big { font-size: 45px; font-weight: 900; margin-bottom: 5px; line-height: 1; }
        .chart-box { height: 180px; background: white; margin-bottom: 15px; }
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .b-btn { padding: 15px; border: none; border-radius: 20px; font-size: 20px; font-weight: 900; cursor: pointer; color: white; transition: 0.2s; }
        .b-buy { background: var(--up-color); }
        .b-sell { background: var(--down-color); }

        .bank-area { margin-top: 15px; padding: 12px; background: #dfe4ea; border-radius: 20px; display: flex; align-items: center; gap: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="news-ticker">
            <div class="news-label">📊 均衡<br>市場情報</div>
            <div class="news-window">
                <div class="news-content" id="newsBox"></div>
            </div>
        </div>

        <div class="main-p">
            <div class="header">
                <div>
                    <h2 style="color: var(--primary)">小小股神：現實趨勢版</h2>
                    <p id="timer" style="color: #ff4757; font-weight: bold;">距離行情實現：15秒</p>
                </div>
                <div style="text-align: right">
                    <div class="card-label">總財產資產</div>
                    <div class="card-val" id="total" style="font-size: 28px; color: var(--primary)">$10,000</div>
                </div>
            </div>

            <div class="asset-grid">
                <div class="card"><div class="card-label">現金</div><div class="card-val" id="cash" style="color: var(--up-color)">$10,000</div></div>
                <div class="card"><div class="card-label">銀行存款</div><div class="card-val" id="bank" style="color: #2ed573">$0</div></div>
                <div class="card"><div class="card-label">股票</div><div class="card-val" id="stockValue">$0</div></div>
                <div class="card" style="background:#fff9e6"><div class="card-label">加密貨幣</div><div class="card-val" id="cryptoValue" style="color: var(--crypto-color)">$0</div></div>
            </div>

            <div class="market-grid">
                <div class="stock-list" id="stockList"></div>
                <div class="display-area">
                    <div style="display:flex; justify-content:space-between; align-items: flex-end; margin-bottom: 5px;">
                        <span id="curName" style="font-weight: bold; color: #747d8c;">-</span>
                        <div style="text-align: right;">
                            <div id="curInventory" style="color: var(--primary); font-weight: 900; font-size: 16px;">持有：0</div>
                            <div id="curProfit" style="font-weight: bold; font-size: 14px; color: #747d8c;">收益：$0</div>
                        </div>
                    </div>
                    <div class="price-big" id="curPrice">$0</div>
                    <div id="curChange" style="font-weight: bold; font-size: 18px; margin-bottom: 5px;">+0.00%</div>
                    
                    <div class="chart-box"><canvas id="mainChart"></canvas></div>

                    <div class="btns">
                        <button class="b-btn b-buy" onclick="trade('buy')">買進</button>
                        <button class="b-btn b-sell" onclick="trade('sell')">賣出</button>
                    </div>
                </div>
            </div>

            <div class="bank-area">
                🏦 銀行存款：<input type="number" id="bankAmt" value="1000" step="100" style="width: 80px; padding: 5px; border-radius: 8px; border:none;">
                <button onclick="bankOp('in')" style="padding: 5px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; border:none;">存入</button>
                <button onclick="bankOp('out')" style="padding: 5px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; border:none;">領錢</button>
                <span id="msg" style="margin-left: auto; color: #57606f; font-size: 13px;">比特幣波幅巨大，請謹慎操作！</span>
            </div>
        </div>
    </div>

    <script>
        const STOCKS = [
            { name: '比特幣 (BTC)', price: 5000, vola: 0.18, drift: 0.002, color: '#f39c12', desc: '數位黃金 (高風險/免手續費)', type: 'crypto' },
            { name: '超級晶片王 (TSM)', price: 800, vola: 0.03, drift: 0.003, color: '#4a69bd', desc: '科技心臟 (穩健)', type: 'stock' },
            { name: '飛天火箭王 (SpaceX)', price: 300, vola: 0.07, drift: 0.004, color: '#f6b93b', desc: '星際探索 (成長潛力)', type: 'stock' },
            { name: '快樂電動車 (EV)', price: 100, vola: 0.05, drift: 0.001, color: '#78e08f', desc: '綠能未來 (震盪中)', type: 'stock' }
        ];

        // 50 種情報定義，嚴格平衡漲跌數量
        // 格式 [BTC, TSM, SpaceX, EV]
        const PREDICTIONS = [
            // --- 上漲情報 (25項) ---
            { t: "📈 比特幣現貨 ETF 獲准通過，機構資金瘋狂湧入！", imp: [1.4, 1.0, 1.0, 1.0] },
            { t: "⚡ 晶片王成功量產 1奈米製程，性能震撼全球！", imp: [1.0, 1.3, 1.0, 1.0] },
            { t: "🚀 火箭王完成火星往返測試，星際移民時代開啟！", imp: [1.0, 1.0, 1.4, 1.0] },
            { t: "🔋 電動車固態電池能量產，里程焦慮成為歷史！", imp: [1.0, 1.0, 1.0, 1.3] },
            { t: "💎 知名大亨宣佈將一半財產換成比特幣。 ", imp: [1.15, 1.0, 1.0, 1.0] },
            { t: "🥇 晶片王包辦全球 AI 伺服器訂單，獲利翻倍！", imp: [1.0, 1.2, 1.0, 1.0] },
            { t: "🔭 發現地外文明訊號，太空探索預算大增！", imp: [1.0, 1.0, 1.25, 1.0] },
            { t: "🌱 政府宣佈未來三年買電動車全額免稅！", imp: [1.0, 1.0, 1.0, 1.25] },
            { t: "🧱 比特幣『減半』完成，市場供應量大幅縮減！", imp: [1.25, 1.0, 1.0, 1.0] },
            { t: "🤖 自動化機器人全面普及，晶片需求大爆發！", imp: [1.0, 1.15, 1.0, 1.0] },
            { t: "📡 火箭王發射第 10000 顆衛星，全球無死角網路！", imp: [1.0, 1.05, 1.2, 1.0] },
            { t: "🚘 電動車智慧駕駛系統通週安全審核，銷量暴增！", imp: [1.0, 1.0, 1.0, 1.2] },
            { t: "🌍 全球主要國家宣佈降息，資金流向科技股與加密貨幣。", imp: [1.1, 1.1, 1.1, 1.1] },
            { t: "🏬 大型超商宣佈接受比特幣支付。 ", imp: [1.12, 1.0, 1.0, 1.0] },
            { t: "💡 全新冷核融合技術突破，電力成本近乎於零！", imp: [1.05, 1.1, 1.1, 1.25] },
            { t: "📦 晶片物流效率提升，全球缺貨問題徹底解決。", imp: [1.0, 1.1, 1.0, 1.0] },
            { t: "🎢 投資大師稱讚比特幣為『最好的避險資產』。", imp: [1.1, 1.0, 1.0, 1.0] },
            { t: "🛸 火箭王宣佈降價，平民也能負擔太空旅行。", imp: [1.0, 1.0, 1.15, 1.0] },
            { t: "📱 蘋果宣佈將與晶片王深度合作研發新晶片。", imp: [1.0, 1.15, 1.0, 1.0] },
            { t: "🏰 某小國宣佈比特幣為第二法定貨幣。", imp: [1.2, 1.0, 1.0, 1.0] },
            { t: "🏆 電動車贏得年度最佳安全獎，信譽大增。", imp: [1.0, 1.0, 1.0, 1.1] },
            { t: "🛡️ 太空軍事合約簽訂，火箭王成為國防寵兒。", imp: [1.0, 1.0, 1.2, 1.0] },
            { t: "🧬 生物科技結合晶片開發成功，訂單湧入。", imp: [1.0, 1.12, 1.0, 1.0] },
            { t: "🛰️ 比特幣衛星錢包研發成功，沒網路也能交易！", imp: [1.1, 1.0, 1.05, 1.0] },
            { t: "🎡 消費者信心指數創十年新高，全體市場走揚。", imp: [1.05, 1.05, 1.05, 1.05] },

            // --- 下跌情報 (25項) ---
            { t: "⚠️ 某大交易所突發倒閉，比特幣出現拋售潮！", imp: [0.65, 1.0, 1.0, 1.0] },
            { t: "🔥 晶片王主要廠區發生火災，產能預計中斷三個月。", imp: [1.0, 0.75, 1.0, 0.9] },
            { t: "💥 火箭發射過程中不幸爆炸，多顆昂貴衛星毀損。", imp: [1.0, 0.95, 0.75, 1.0] },
            { t: "🛑 全球宣佈對鋰電池課徵額外環保稅。 ", imp: [1.0, 1.0, 1.0, 0.8] },
            { t: "⚖️ 政府宣佈嚴格監管加密貨幣，洗錢防治法趨嚴。", imp: [0.8, 1.0, 1.0, 1.0] },
            { t: "💻 競爭對手開發出更廉價的晶片架構，晶片王優勢不在。", imp: [1.0, 0.85, 1.0, 1.0] },
            { t: "☄️ 太空垃圾問題失控，政府宣佈暫停所有發射。 ", imp: [1.0, 0.95, 0.8, 1.0] },
            { t: "⚠️ 電動車傳出電池自燃事故，數萬輛車緊急召回。", imp: [1.0, 1.0, 1.0, 0.75] },
            { t: "👾 頂尖駭客聲稱掌握比特幣底层漏洞。 ", imp: [0.75, 1.0, 1.0, 1.0] },
            { t: "📦 由於戰爭影響，晶片關鍵材料氖氣供應中斷。", imp: [1.0, 0.88, 0.95, 0.95] },
            { t: "🛑 多國央行宣佈升息，資金撤出高風險市場。", imp: [0.9, 0.92, 0.9, 0.9] },
            { t: "⛈️ 洪水淹沒電動車生產基地，交貨期大幅延遲。", imp: [1.0, 1.0, 1.0, 0.85] },
            { t: "📉 經濟數據疲軟，市場擔憂長期通縮來臨。", imp: [0.9, 0.9, 0.9, 0.9] },
            { t: "📵 全球大規模網路故障，比特幣無法正常交易。", imp: [0.85, 0.98, 0.98, 1.0] },
            { t: "🍭 電動車競爭陷入惡性價格戰，獲利空間壓縮。", imp: [1.0, 1.0, 1.0, 0.85] },
            { t: "🛠️ 火箭王發現零件設計瑕疵，需停工大檢修。", imp: [1.0, 1.0, 0.88, 1.0] },
            { t: "📑 某大國宣佈將晶片王列入貿易限制名單。", imp: [1.0, 0.8, 1.0, 1.0] },
            { t: "💸 比特幣早期錢包甦醒，大戶開始拋售。 ", imp: [0.88, 1.0, 1.0, 1.0] },
            { t: "🦆 競爭對手研發出超低價載人氣球，衝擊太空旅遊。", imp: [1.0, 1.0, 0.9, 1.0] },
            { t: "🍬 晶片生產瑕疵率提高，客戶信心動搖。 ", imp: [1.0, 0.92, 1.0, 1.0] },
            { t: "🔋 發現鋰電池在低溫下效能極差，北方國家銷量慘跌。", imp: [1.0, 1.0, 1.0, 0.88] },
            { t: "🥊 火箭王被控壟斷市場，面臨鉅額罰款。 ", imp: [1.0, 1.0, 0.9, 1.0] },
            { t: "📉 網路上流傳『比特幣已死』的傳聞，散戶恐慌。", imp: [0.92, 1.0, 1.0, 1.0] },
            { t: "🌦️ 氣象預報顯示極端氣候頻傳，不利於科技生產。", imp: [0.95, 0.95, 0.95, 0.95] },
            { t: "💤 全球交易熱度下降，市場進入漫長寒冬。 ", imp: [0.98, 0.98, 0.98, 0.98] }
        ];

        let cash = 10000, bank = 0, curIdx = 0, holdings = [0, 0, 0, 0], totalCosts = [0, 0, 0, 0];
        let priceHistories = STOCKS.map(s => Array(25).fill(s.price));
        let timer = 15, chart, currentEvents = [];
        const STOCK_FEE = 0.01;

        window.onload = () => { prepareNextEvents(); initChart(); updateUI(); setInterval(tick, 1000); };

        function prepareNextEvents() {
            currentEvents = [];
            let pool = [...PREDICTIONS];
            for (let i = 0; i < 3; i++) {
                const idx = Math.floor(Math.random() * pool.length);
                currentEvents.push(pool.splice(idx, 1)[0]);
            }
            const box = document.getElementById('newsBox');
            box.style.animation = 'none'; box.offsetHeight; 
            box.style.animation = 'scrollUpGroup 5s cubic-bezier(0.23, 1, 0.32, 1) infinite';
            box.innerHTML = currentEvents.map(ev => `<div class="news-item">${ev.t}</div>`).join('');
        }

        function tick() {
            timer--;
            document.getElementById('timer').innerText = `距離行情實現：${timer}秒`;
            if (timer <= 0) { applyMarketChanges(); timer = 15; }
        }

        function applyMarketChanges() {
            STOCKS.forEach((s, i) => {
                const last = priceHistories[i][priceHistories[i].length - 1];
                // 基礎隨機波動 + 長期趨勢偏移
                let move = Math.exp(s.drift + s.vola * (Math.random() - 0.5) * 2);
                // 累計情報影響
                currentEvents.forEach(ev => { move *= ev.imp[i]; });
                
                let nextPrice = last * move;
                // 防止歸零
                if (nextPrice < 1) nextPrice = 1;
                
                priceHistories[i].push(nextPrice);
                if (priceHistories[i].length > 25) priceHistories[i].shift();
            });
            if (bank > 0) bank *= 1.02; // 銀行固定利息
            prepareNextEvents(); updateUI();
        }

        function initChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: Array(25).fill(''), datasets: [{ data: priceHistories[curIdx], borderColor: STOCKS[curIdx].color, borderWidth: 5, pointRadius: 0, tension: 0.4, fill: true, backgroundColor: STOCKS[curIdx].color + '22' }] },
                options: { 
                    responsive: true, maintainAspectRatio: false, 
                    animation: { duration: 800 },
                    plugins: { legend: false }, 
                    scales: { x: { display: false }, y: { position: 'right', grid: { color: '#f1f2f6' } } } 
                }
            });
        }

        function updateUI() {
            const history = priceHistories[curIdx];
            const now = history[history.length - 1];
            const prev = history[history.length - 2];
            const change = ((now - prev) / prev * 100).toFixed(2);

            document.getElementById('stockList').innerHTML = STOCKS.map((s, i) => {
                const p = priceHistories[i][priceHistories[i].length-1];
                const profit = holdings[i] > 0 ? (p * holdings[i] - totalCosts[i]) : 0;
                const profitPercent = holdings[i] > 0 ? (profit / totalCosts[i] * 100) : 0;
                return `
                <div class="stock-item ${i === curIdx ? (s.type==='crypto'?'crypto-active':'active') : ''}" onclick="selectStock(${i})">
                    <div style="font-size:10px; color:#999">${s.desc}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${s.name}</b>
                        <span style="font-weight:900">$${p.toFixed(1)}</span>
                    </div>
                    <div class="badge-row">
                        ${holdings[i] > 0 ? `<span class="hold-badge">${holdings[i].toFixed(0)} 單</span>` : ''}
                        ${holdings[i] > 0 ? `<span class="profit-badge" style="background:${profit>=0?'var(--up-color)':'var(--down-color)'}">${profit>=0?'+':''}${profitPercent.toFixed(1)}%</span>` : ''}
                    </div>
                </div>`;
            }).join('');

            document.getElementById('curPrice').innerText = `$${now.toFixed(1)}`;
            document.getElementById('curName').innerText = STOCKS[curIdx].name;
            document.getElementById('curInventory').innerText = `持有：${holdings[curIdx].toFixed(0)}`;
            
            const currentProfit = holdings[curIdx] > 0 ? (now * holdings[curIdx] - totalCosts[curIdx]) : 0;
            document.getElementById('curProfit').innerText = `淨收益：$${currentProfit.toFixed(0)}`;
            document.getElementById('curProfit').style.color = currentProfit >= 0 ? 'var(--up-color)' : 'var(--down-color)';

            const cEl = document.getElementById('curChange');
            cEl.innerText = `${change >= 0 ? '▲' : '▼'} ${Math.abs(change)}%`;
            cEl.style.color = change >= 0 ? 'var(--up-color)' : 'var(--down-color)';
            document.getElementById('curPrice').style.color = change >= 0 ? 'var(--up-color)' : 'var(--down-color)';

            let sVal = 0, cVal = 0;
            STOCKS.forEach((s, i) => {
                let val = priceHistories[i][priceHistories[i].length-1] * holdings[i];
                if(s.type === 'crypto') cVal += val; else sVal += val;
            });

            document.getElementById('stockValue').innerText = `$${sVal.toLocaleString(undefined, {maximumFractionDigits:0})}`;
            document.getElementById('cryptoValue').innerText = `$${cVal.toLocaleString(undefined, {maximumFractionDigits:0})}`;
            document.getElementById('total').innerText = `$${(cash + bank + sVal + cVal).toLocaleString(undefined, {maximumFractionDigits:0})}`;
            document.getElementById('cash').innerText = `$${cash.toLocaleString(undefined, {maximumFractionDigits:0})}`;
            document.getElementById('bank').innerText = `$${bank.toLocaleString(undefined, {maximumFractionDigits:0})}`;

            chart.data.datasets[0].data = history;
            chart.data.datasets[0].borderColor = STOCKS[curIdx].color;
            chart.update('none');
        }

        function selectStock(i) { curIdx = i; updateUI(); }

        function trade(type) {
            const s = STOCKS[curIdx];
            const p = priceHistories[curIdx][priceHistories[curIdx].length - 1];
            const fee = s.type === 'crypto' ? 0 : p * STOCK_FEE;
            
            if (type === 'buy') {
                const totalNeed = p + fee;
                if (cash >= totalNeed) { 
                    cash -= totalNeed; holdings[curIdx]++; totalCosts[curIdx] += totalNeed;
                    msg(`✅ 買入成功！${fee>0?`手續費 $${fee.toFixed(1)}` : '加密貨幣免手續費！'}`);
                } else msg("😥 餘額不足以支付股價與手續費。");
            } else {
                if (holdings[curIdx] > 0) { 
                    const avgCost = totalCosts[curIdx] / holdings[curIdx];
                    const receive = p - fee;
                    cash += receive; holdings[curIdx]--; totalCosts[curIdx] -= avgCost;
                    msg(`💰 賣出成功！入帳 $${receive.toFixed(1)}`);
                } else msg("😮 您目前並未持有此項資產。");
            }
            updateUI();
        }

        function bankOp(type) {
            const amt = parseInt(document.getElementById('bankAmt').value);
            if (isNaN(amt) || amt <= 0) return;
            if (type === 'in' && cash >= amt) { cash -= amt; bank += amt; msg(`🏦 已將 $${amt} 轉入銀行存款。`); }
            else if (type === 'out' && bank >= amt) { bank -= amt; cash += amt; msg(`🏦 已從銀行領出 $${amt}。`); }
            updateUI();
        }

        function msg(t) { document.getElementById('msg').innerText = t; }
    </script>
</body>
</html>
